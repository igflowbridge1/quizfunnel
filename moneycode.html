<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>How Effective Is Your Money Code?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0f1f3d;
      --navy-mid: #1a3460;
      --navy-light: #2a4a80;
      --accent: #c8a96e;
      --accent-light: #f5eddb;
      --white: #ffffff;
      --off-white: #f7f6f3;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: #e5e3dc;
      --danger: #b83232;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--off-white);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      background: var(--navy);
      padding: 1.1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      font-family: 'DM Serif Display', serif;
      color: var(--white);
      font-size: 1.05rem;
      letter-spacing: 0.02em;
    }
    .logo span { color: var(--accent); }
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .progress-pct {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      min-width: 30px;
      text-align: right;
    }
    .progress-track {
      width: 160px;
      height: 3px;
      background: rgba(255,255,255,0.12);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1.25rem 5rem;
    }

    .card {
      background: var(--white);
      border-radius: 18px;
      box-shadow: 0 4px 32px rgba(15,31,61,0.09), 0 1px 4px rgba(15,31,61,0.05);
      width: 100%;
      max-width: 620px;
      overflow: hidden;
      animation: fadeUp 0.38s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* CARD SECTIONS */
    .card-top {
      background: var(--navy);
      padding: 2.25rem 2.5rem 2rem;
    }
    .step-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.65rem;
    }
    .card-top h2 {
      font-family: 'DM Serif Display', serif;
      color: var(--white);
      font-size: 1.6rem;
      line-height: 1.3;
    }
    .card-top p {
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      margin-top: 0.5rem;
      line-height: 1.65;
    }
    .card-body { padding: 2rem 2.5rem 2.5rem; }

    /* OPTIONS */
    .options { display: flex; flex-direction: column; gap: 0.65rem; }
    .option {
      display: flex;
      align-items: flex-start;
      gap: 0.9rem;
      padding: 0.95rem 1.15rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--white);
      text-align: left;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.93rem;
      color: var(--text);
      width: 100%;
      line-height: 1.5;
    }
    .option:hover { border-color: var(--navy-light); background: #f0f4fa; }
    .option.selected { border-color: var(--navy); background: #edf2fb; }
    .opt-letter {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 600; color: var(--text-muted);
      flex-shrink: 0;
      margin-top: 1px;
      transition: all 0.15s;
    }
    .option.selected .opt-letter {
      background: var(--navy); border-color: var(--navy); color: var(--white);
    }

    /* INPUTS */
    .field { margin-bottom: 1.2rem; }
    .field label {
      display: block;
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }
    .field input, .field select {
      width: 100%;
      padding: 0.82rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.97rem;
      color: var(--text);
      background: var(--white);
      outline: none;
      transition: border-color 0.15s;
      appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--navy); }
    .field input::placeholder { color: #c5c3bb; }
    .field-hint { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.3rem; line-height: 1.4; }

    /* BUTTONS */
    .btn {
      width: 100%;
      padding: 0.95rem;
      background: var(--navy);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.97rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 1.4rem;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
      letter-spacing: 0.02em;
    }
    .btn:hover { background: var(--navy-mid); }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.38; cursor: not-allowed; }

    /* LANDING */
    .landing { padding: 3rem 2.5rem 2.75rem; text-align: center; }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent-light);
      color: var(--navy);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.32rem 0.8rem;
      border-radius: 99px;
      margin-bottom: 1.25rem;
    }
    .landing h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.2rem;
      line-height: 1.2;
      color: var(--navy);
      margin-bottom: 1rem;
    }
    .landing h1 em { font-style: italic; color: var(--navy-light); }
    .landing p {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 460px;
      margin: 0 auto 2rem;
    }
    .meta {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      margin-top: 0.5rem;
    }
    .meta-item strong { display: block; font-size: 1.05rem; color: var(--navy); font-weight: 600; }
    .meta-item span { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; }

    /* EMAIL GATE */
    .gate { padding: 2.75rem 2.5rem; text-align: center; }
    .gate-icon {
      width: 54px; height: 54px;
      background: var(--accent-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 1.4rem;
    }
    .gate h3 { font-family: 'DM Serif Display', serif; font-size: 1.55rem; color: var(--navy); margin-bottom: 0.5rem; }
    .gate > p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.65; margin-bottom: 1.75rem; }
    .privacy { font-size: 0.73rem; color: var(--text-muted); margin-top: 0.75rem; }

    /* RESULTS */
    .results-top { background: var(--navy); padding: 2.5rem; text-align: center; }
    .ring-wrap { position: relative; width: 118px; height: 118px; margin: 0 auto 1.25rem; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-center {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .ring-num { font-family: 'DM Serif Display', serif; font-size: 2.1rem; color: var(--white); line-height: 1; }
    .ring-sub { font-size: 0.62rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.1em; }
    .results-top h2 { font-family: 'DM Serif Display', serif; color: var(--white); font-size: 1.5rem; margin-bottom: 0.4rem; }
    .results-top p { color: rgba(255,255,255,0.6); font-size: 0.87rem; }

    .results-body { padding: 2rem 2.5rem 2.5rem; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .stat {
      background: var(--off-white);
      border-radius: 10px;
      padding: 1.1rem 1.2rem;
    }
    .stat-val {
      font-family: 'DM Serif Display', serif;
      font-size: 1.65rem;
      color: var(--navy);
      line-height: 1.1;
    }
    .stat-val.bad { color: var(--danger); }
    .stat-desc { font-size: 0.76rem; color: var(--text-muted); margin-top: 0.25rem; line-height: 1.45; }

    .insight {
      background: #fffbf3;
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 1.1rem 1.25rem;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--text);
    }

    hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

    .cta-box {
      background: var(--navy);
      border-radius: 12px;
      padding: 1.75rem 1.75rem 2rem;
      text-align: center;
    }
    .cta-box h3 { font-family: 'DM Serif Display', serif; color: var(--white); font-size: 1.3rem; margin-bottom: 0.45rem; }
    .cta-box p { font-size: 0.86rem; color: rgba(255,255,255,0.6); line-height: 1.65; margin-bottom: 1.25rem; }
    .btn-gold {
      display: inline-block;
      background: var(--accent);
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.93rem;
      padding: 0.9rem 2rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.02em;
    }
    .btn-gold:hover { opacity: 0.85; }
    .sent-note { text-align: center; font-size: 0.76rem; color: var(--text-muted); margin-top: 1.1rem; }

    @media (max-width: 560px) {
      .card-top, .card-body, .landing, .gate, .results-body { padding-left: 1.4rem; padding-right: 1.4rem; }
      .landing h1 { font-size: 1.75rem; }
      .stats { grid-template-columns: 1fr; }
      header { padding: 1rem 1.25rem; }
      .progress-track { width: 110px; }
      .meta { gap: 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Money <span>Codes</span></div>
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="pFill" style="width:0%"></div>
    </div>
    <div class="progress-pct" id="pPct">0%</div>
  </div>
</header>

<main><div class="card" id="card"></div></main>

<script>
const Qs = [
  {
    id:'q1',
    q:"When you receive unexpected money — a bonus, tax refund, or gift — what do you typically do?",
    opts:[
      "Spend most of it on something I've been wanting",
      "Split it between spending and saving",
      "Save or invest most of it",
      "I already have a plan for it before it arrives"
    ],
    scores:[1,2,3,4]
  },
  {
    id:'q2',
    q:"How clearly can you describe what financial freedom looks like for you?",
    opts:[
      "I haven't really thought about it in concrete terms",
      "I have a vague idea but no specific number",
      "I have a goal but no clear timeline",
      "I have a specific number and a plan to reach it"
    ],
    scores:[1,2,3,4]
  },
  {
    id:'q3',
    q:"How much of your income do you consciously direct toward building wealth each month?",
    opts:[
      "Very little — most goes to living expenses and lifestyle",
      "I save whatever's left over at month end",
      "I save a consistent percentage before spending",
      "I have multiple streams building wealth automatically"
    ],
    scores:[1,2,3,4]
  },
  {
    id:'q4',
    q:"When you think about money, what's your dominant feeling?",
    opts:[
      "Stress or anxiety — there's never quite enough",
      "Neutral — it comes and goes",
      "Cautiously optimistic — I'm making progress",
      "Confident — money is a tool I know how to use"
    ],
    scores:[1,2,3,4]
  },
  {
    id:'q5',
    q:"How do you primarily think about your time in relation to money?",
    opts:[
      "I trade my time for money — that's just how it works",
      "I'd like to change that relationship but don't know how",
      "I'm building assets that will eventually replace my time",
      "My knowledge generates income independently of my time"
    ],
    scores:[1,2,3,4]
  }
];

const S = {
  step: 0,
  answers: {},
  quizScore: 0,
  nw: '', yw: '', sav: '', goal: '', partnered: false,
  name: '', email: ''
};

const TOTAL = 9;

function setProgress(n) {
  const pct = Math.round((n / TOTAL) * 100);
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pPct').textContent = pct + '%';
}

function refresh() {
  const c = document.getElementById('card');
  c.style.animation = 'none';
  void c.offsetHeight;
  c.style.animation = 'fadeUp 0.35s ease both';

  if (S.step === 0) renderLanding(c);
  else if (S.step >= 1 && S.step <= 5) renderQ(c, S.step - 1);
  else if (S.step === 6) renderCalc1(c);
  else if (S.step === 7) renderCalc2(c);
  else if (S.step === 8) renderGate(c);
  else renderResults(c);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function next() { S.step++; refresh(); }

/* LANDING */
function renderLanding(c) {
  setProgress(0);
  c.innerHTML = `
    <div class="landing">
      <div class="tag">✦ Free Assessment</div>
      <h1>How Effective Is Your<br><em>Money Code?</em></h1>
      <p>Your financial results aren't a money problem — they're a code problem. Answer 9 short questions and discover whether your money code is working for you or against you.</p>
      <button class="btn" onclick="next()">Start the Assessment →</button>
      <div class="meta">
        <div class="meta-item"><strong>2 min</strong><span>to complete</span></div>
        <div class="meta-item"><strong>9 questions</strong><span>personalised</span></div>
        <div class="meta-item"><strong>Free</strong><span>always</span></div>
      </div>
    </div>`;
}

/* QUESTIONS */
function renderQ(c, idx) {
  setProgress(idx + 1);
  const q = Qs[idx];
  const letters = ['A','B','C','D'];
  c.innerHTML = `
    <div class="card-top">
      <div class="step-label">Question ${idx+1} of 5</div>
      <h2>${q.q}</h2>
    </div>
    <div class="card-body">
      <div class="options">
        ${q.opts.map((o,i) => `
          <button class="option ${S.answers[q.id]===i?'selected':''}"
            onclick="pick('${q.id}',${i},${q.scores[i]})">
            <div class="opt-letter">${letters[i]}</div>
            <span>${o}</span>
          </button>`).join('')}
      </div>
      <button class="btn" id="nb" onclick="next()" ${S.answers[q.id]===undefined?'disabled':''}>
        ${idx < 4 ? 'Next Question →' : 'Enter My Numbers →'}
      </button>
    </div>`;
}

function pick(id, idx, score) {
  const q = Qs.find(q=>q.id===id);
  if (S.answers[id] !== undefined) S.quizScore -= q.scores[S.answers[id]];
  S.answers[id] = idx;
  S.quizScore += score;
  document.querySelectorAll('.option').forEach((el,i)=>el.classList.toggle('selected',i===idx));
  const nb = document.getElementById('nb');
  if (nb) nb.disabled = false;
}

/* CALC 1 */
function renderCalc1(c) {
  setProgress(6);
  c.innerHTML = `
    <div class="card-top">
      <div class="step-label">Your Numbers — 1 of 2</div>
      <h2>Let's calculate your real financial position</h2>
      <p>Approximate figures are fine — this is for your insight only.</p>
    </div>
    <div class="card-body">
      <div class="field">
        <label>Current Net Worth</label>
        <input type="number" placeholder="e.g. 150000" value="${S.nw}" oninput="S.nw=this.value" />
        <div class="field-hint">Total assets minus total debts, including home equity</div>
      </div>
      <div class="field">
        <label>Years You've Been Working</label>
        <input type="number" placeholder="e.g. 15" value="${S.yw}" oninput="S.yw=this.value" />
      </div>
      <div class="field">
        <label>Annual Savings / Investment Amount</label>
        <input type="number" placeholder="e.g. 12000" value="${S.sav}" oninput="S.sav=this.value" />
        <div class="field-hint">How much you actively save or invest each year</div>
      </div>
      <button class="btn" onclick="checkCalc1()">Continue →</button>
    </div>`;
}

function checkCalc1() {
  if (!S.nw || !S.yw || !S.sav) { alert('Please fill in all three fields to continue.'); return; }
  next();
}

/* CALC 2 */
function renderCalc2(c) {
  setProgress(7);
  c.innerHTML = `
    <div class="card-top">
      <div class="step-label">Your Numbers — 2 of 2</div>
      <h2>One final question — the most important one</h2>
      <p>This is the number that changes everything once you see it clearly.</p>
    </div>
    <div class="card-body">
      <div class="field">
        <label>Your Financial Freedom Goal</label>
        <input type="number" placeholder="e.g. 2000000" value="${S.goal}" oninput="S.goal=this.value" />
        <div class="field-hint">The net worth at which you'd no longer need to work for money</div>
      </div>
      <div class="field">
        <label>Relationship Status</label>
        <select onchange="S.partnered=this.value==='yes'">
          <option value="no" ${!S.partnered?'selected':''}>Single</option>
          <option value="yes" ${S.partnered?'selected':''}>Partnered / Married</option>
        </select>
        <div class="field-hint">Used to calculate your individual share of net worth</div>
      </div>
      <button class="btn" onclick="checkCalc2()">See My Results →</button>
    </div>`;
}

function checkCalc2() {
  if (!S.goal) { alert('Please enter your financial freedom goal to continue.'); return; }
  next();
}

/* EMAIL GATE */
function renderGate(c) {
  setProgress(8);
  c.innerHTML = `
    <div class="gate">
      <div class="gate-icon">🔓</div>
      <h3>Your results are ready</h3>
      <p>Enter your details to unlock your personalised Money Code Report — including your real hourly rate and years to financial freedom at your current trajectory.</p>
      <div class="field" style="text-align:left">
        <label>First Name</label>
        <input type="text" id="ni" placeholder="Your first name" value="${S.name}" oninput="S.name=this.value" />
      </div>
      <div class="field" style="text-align:left">
        <label>Email Address</label>
        <input type="email" id="ei" placeholder="your@email.com" value="${S.email}" oninput="S.email=this.value" />
      </div>
      <button class="btn" style="margin-top:0.5rem" onclick="submitGate()">Unlock My Report →</button>
      <p class="privacy">🔒 No spam, ever. Unsubscribe anytime.</p>
    </div>`;
}

function submitGate() {
  const name = document.getElementById('ni').value.trim();
  const email = document.getElementById('ei').value.trim();
  if (!name) { alert('Please enter your first name.'); return; }
  if (!email || !email.includes('@')) { alert('Please enter a valid email address.'); return; }
  S.name = name; S.email = email;
  // ↓ Hook your email platform here (Mailchimp, ConvertKit, etc.)
  console.log('Lead:', { name, email, score: S.quizScore, nw: S.nw, goal: S.goal });
  next();
}

/* RESULTS */
function renderResults(c) {
  setProgress(9);

  const nw = parseFloat(S.nw)||0;
  const yw = Math.max(parseFloat(S.yw)||1, 1);
  const sav = Math.max(parseFloat(S.sav)||1, 1);
  const goal = parseFloat(S.goal)||1;
  const div = S.partnered ? 2 : 1;

  const realHourly = (nw / div) / (yw * 52 * 5 * 8);
  const yrsToFree = (goal - nw) / sav;

  const maxQ = 20;
  const pct = Math.round((S.quizScore / maxQ) * 100);
  const r = 50, cx = 59, cy = 59;
  const circ = 2 * Math.PI * r;
  const dash = circ * (1 - pct / 100);

  let label, sub, insight;
  if (pct <= 30) {
    label = "Consumption Code";
    sub = "Your money code is currently working against you";
    insight = `${S.name}, your results show a classic consumption code — money flows out almost as fast as it comes in. This isn't a character flaw, it's a program. You were socially conditioned to earn, spend, and borrow. The good news? Codes can be rewritten. It starts with understanding exactly what's happening — which these numbers now show you clearly.`;
  } else if (pct <= 55) {
    label = "Transitional Code";
    sub = "You're aware, but the old code still has a strong pull";
    insight = `${S.name}, you're at an interesting crossroads. You have some healthy money habits, but old consumption patterns are still limiting your progress. The gap between where you are and financial freedom is real — but so is your capacity to close it. The key is rewiring the code at the root level, not just changing surface behaviours.`;
  } else if (pct <= 75) {
    label = "Emerging Enterprise Code";
    sub = "You're on the right track but leaving significant value on the table";
    insight = `${S.name}, you've made meaningful shifts in how you think about money. But your numbers likely show a long runway still ahead. The missing piece is usually leverage — moving from trading time for money to multiplying the value of your knowledge and skills.`;
  } else {
    label = "Enterprise Code";
    sub = "Your money code is aligned for wealth creation";
    insight = `${S.name}, your behavioural profile suggests a strong enterprise code — you think about money as a tool, not just a reward. Your biggest opportunity now is accelerating the timeline and protecting what you're building from inflation and systemic risk.`;
  }

  const hourlyStr = realHourly < 0 ? '$0.00' : `$${realHourly.toFixed(2)}`;
  const yrsStr = yrsToFree < 0 ? 'Already there' : yrsToFree > 999 ? '999+ years' : `${Math.round(yrsToFree)} yrs`;

}
